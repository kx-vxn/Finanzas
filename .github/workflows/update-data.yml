name: Actualizar datos diarios

on:
  schedule:
    - cron: '15 11 * * *'   # ~06:15 hora de México (11:15 UTC) cada día
  workflow_dispatch:          # permite correrlo manualmente

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bajar datos
        run: node scripts/update-data.mjs

      - name: Commit si hay cambios
        run: |
          git config user.name "finanzas-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "data: actualización automática $(date -u +%Y-%m-%d)"
            git push
          fi
